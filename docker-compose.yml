version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fspet_postgres_db
    user: root
    environment:
      POSTGRES_DB: fspet
      POSTGRES_USER: fspet_user
      POSTGRES_PASSWORD: fspet_secure_password_2026
    ports:
      - "5433:5432"
    volumes:
      - ./db-certs:/certs:ro
      - pgdata:/var/lib/postgresql/data
    entrypoint:
      - bash
      - -c
      - |
        mkdir -p /var/lib/postgresql/certs
        cp /certs/server.key /var/lib/postgresql/certs/server.key
        cp /certs/server.crt /var/lib/postgresql/certs/server.crt
        chmod 600 /var/lib/postgresql/certs/server.key
        chown -R postgres:postgres /var/lib/postgresql/certs
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/certs/server.crt \
          -c ssl_key_file=/var/lib/postgresql/certs/server.key
    restart: always

volumes:
  pgdata:
